<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <header>
      <h1>🌸 Budget Tracker</h1>
      <p class="subtitle">Track your income and expenses</p>
    </header>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="card income-card">
        <span>Total Income</span>
        <h2 id="total-income">₹0</h2>
      </div>
      <div class="card expense-card">
        <span>Total Expenses</span>
        <h2 id="total-expense">₹0</h2>
      </div>
      <div class="card balance-card">
        <span>Balance</span>
        <h2 id="balance">₹0</h2>
      </div>
    </div>

    <!-- Budget Goal -->
    <div class="goal-section">
      <div class="goal-header">
        <h3>Monthly Budget Goal</h3>
        <div class="goal-input-row">
          <input type="number" id="budget-goal" placeholder="Set budget limit (₹)" oninput="updateGoal()"/>
          <span id="goal-status"></span>
        </div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <p id="goal-label" class="goal-label">Set a budget goal above</p>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-section">
      <h3>Add Transaction</h3>
      <div class="form-row">
        <input type="text" id="desc" placeholder="Description (e.g. Salary, Rent)" />
        <input type="number" id="amount" placeholder="Amount" />
        <select id="category">
          <option value="Food">Food</option>
          <option value="Rent">Rent</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Salary">Salary</option>
          <option value="Other">Other</option>
        </select>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <button onclick="addTransaction()">Add</button>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts">
      <div class="chart-box">
        <h3>Spending by Category</h3>
        <canvas id="pieChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>Income vs Expenses</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    <!-- Transactions -->
    <div class="transactions">
      <div class="transactions-header">
        <h3>Transactions</h3>
        <div class="filter-row">
          <input type="text" id="search-bar" placeholder="Search..." oninput="renderAll()" />
          <select id="month-filter" onchange="renderAll()">
            <option value="all">All Months</option>
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
          </select>
        </div>
      </div>
      <ul id="transaction-list"></ul>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
